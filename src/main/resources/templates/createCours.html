<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" type="text/css"
      href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Ajouter Cours</title>
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header">Ajouter un Cours</div>
        <div class="card-body">

            <form th:action="@{saveCours}" method="post">
                <div class="form-group">
                    <label>Nom Cours</label>
                    <input type="text" name="nomCours" class="form-control"/>
                </div>

                <div class="form-group">
                    <label>Prix</label>
                    <input type="number" step="0.01" name="prixCours" class="form-control"/>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" class="form-control"/>
                </div>

                <button class="btn btn-success mt-3" type="submit">Enregistrer</button>
            </form>

            <div class="alert alert-info mt-3" th:if="${msg}" th:text="${msg}"></div>

        </div>
    </div>
</div>
</body>
</html>
<form th:action="@{saveCours}" method="post">
