<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" type="text/css" href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Liste des Cours</title>
</head>
<body>
<div th:replace="template"></div>

<div class="container mt-5">
    <div class="card">
        <div class="card-header">Liste des Cours</div>
        <div class="card-body">



            <table class="table table-striped">
                <tr>
                    <th>ID</th>
                    <th>Nom Cours</th>
                    <th>Prix</th>
                    <th>Date</th>
                    <th>Section</th>
                    <th>Editer</th>
                    <th>Supprimer</th>
                </tr>

                <tr th:each="c:${cours.content}">
                    <td th:text="${c.idCours}"></td>
                    <td th:text="${c.nomCours}"></td>
                    <td th:text="${c.prixCours}"></td>
                    <td th:text="${#dates.format(c.dateCreation,'yyyy-MM-dd')}"></td>

                    <td th:if="${!#strings.isEmpty(c.section)}" th:text="${c.section.nomSection}"></td>
                    <td th:if="${#strings.isEmpty(c.section)}" th:text="${'Pas de Section'}"></td>

                    <td>
                        <a class="btn btn-success"
                           th:href="@{modifierCours(id=${c.idCours},page=${currentPage},size=${size})}">
                            Editer
                        </a>
                    </td>

                    <td>
                        <a class="btn btn-danger"
                           onclick="return confirm('Etes-vous sûr ?')"
                           th:href="@{supprimerCours(id=${c.idCours},page=${currentPage},size=${size})}">
                            Supprimer
                        </a>
                    </td>
                </tr>
            </table>

            <ul class="nav nav-pills">
                <li th:each="p,status:${pages}">
                    <a th:class="${status.index==currentPage?'btn btn-primary':'btn'}"
                       th:href="@{ListeCours(page=${status.index}, size=${size})}"
                       th:text="${status.index + 1}">
                    </a>
                </li>
            </ul>

        </div>
    </div>
</div>
</body>
</html>
